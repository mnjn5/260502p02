<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS증권 스타일 헤더</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --header-bg: #ffffff;
            --logo-blue: #0a2f6b;
            --logo-accent-red: #e31837;
            --logo-gray: #6b7280;
            --nav-text: #111827;
            --icon-gradient: linear-gradient(135deg, #c026d3 0%, #7c3aed 35%, #1e3a8a 100%);
            --icon-border: #d1d5db;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f3f4f6;
        }

        .site-header {
            background: var(--header-bg);
            border-bottom: 1px solid #e5e7eb;
        }

        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        /* 로고 */
        .logo {
            display: flex;
            align-items: baseline;
            gap: 2px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .logo-ls {
            display: inline-flex;
            align-items: flex-start;
            font-size: 1.5rem;
            font-weight: 700;
            font-style: italic;
            color: var(--logo-blue);
            letter-spacing: -0.02em;
        }

        .logo-s-wrap {
            position: relative;
            display: inline-block;
        }

        .logo-s-accent {
            position: absolute;
            top: -2px;
            right: -1px;
            width: 6px;
            height: 4px;
            background: var(--logo-accent-red);
            border-radius: 1px 2px 2px 0;
            transform: rotate(-12deg);
        }

        .logo-sub {
            font-size: 1.125rem;
            font-weight: 500;
            font-style: normal;
            color: var(--logo-gray);
            margin-left: 2px;
        }

        /* 중앙 네비 */
        .main-nav {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .main-nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 2vw, 28px);
        }

        .main-nav a {
            color: var(--nav-text);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            white-space: nowrap;
            padding: 8px 0;
        }

        .main-nav a:hover {
            color: var(--logo-blue);
        }

        .main-nav a.is-active {
            font-weight: 700;
        }

        /* 우측 액션 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .icon-btn:hover {
            transform: translateY(-1px);
        }

        .icon-btn--filled {
            background: var(--icon-gradient);
            color: #fff;
            box-shadow: 0 2px 8px rgba(30, 58, 138, 0.35);
        }

        .icon-btn--outline {
            background: #fff;
            border: 1px solid var(--icon-border);
        }

        .icon-btn--menu {
            background: transparent;
            width: 44px;
            height: 44px;
            flex-direction: column;
            gap: 5px;
            border-radius: 8px;
        }

        .icon-btn--menu:hover {
            background: #f9fafb;
        }

        .icon-btn--menu span {
            display: block;
            width: 20px;
            height: 2px;
            background: #111827;
            border-radius: 1px;
        }

        .horn-icon {
            width: 22px;
            height: 22px;
        }

        @media (max-width: 1024px) {
            .header-inner {
                flex-wrap: wrap;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            .main-nav {
                order: 3;
                flex-basis: 100%;
                justify-content: flex-start;
            }

            .main-nav ul {
                justify-content: flex-start;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }
        }

        /* 메인 영역 */
        .site-main {
            text-align: center;
            padding: 3rem 24px 4rem;
        }

        .hero-headline {
            margin: 0 0 3rem;
            font-size: 4em;
            font-weight: 700;
            line-height: 1.2;
            color: var(--nav-text);
        }

        .main-gallery {
            width: 1200px;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 1.5rem;
        }

        .main-gallery img {
            flex: 1 1 0;
            min-width: 0;
            width: 0;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            border-radius: 8px;
            filter: drop-shadow(0 14px 28px rgba(15, 23, 42, 0.22))
                drop-shadow(0 4px 10px rgba(15, 23, 42, 0.12));
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="#" class="logo" aria-label="LS증권 홈">
                <span class="logo-ls">
                    L<span class="logo-s-wrap">S<span class="logo-s-accent" aria-hidden="true"></span></span>
                </span>
                <span class="logo-sub">증권</span>
            </a>

            <nav class="main-nav" aria-label="주요 메뉴">
                <ul>
                    <li><a href="#" class="is-active">투혼스토리</a></li>
                    <li><a href="#">WHY 투혼</a></li>
                    <li><a href="#">처음이신가요?</a></li>
                    <li><a href="#">이벤트</a></li>
                    <li><a href="#">투혼 서비스</a></li>
                    <li><a href="#">모의투자</a></li>
                    <li><a href="#">트레이딩</a></li>
                    <li><a href="#">투혼클래스</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <button type="button" class="icon-btn icon-btn--filled" aria-label="앱 바로가기">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                        <path d="M9 17h6M12 6v4"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--outline" aria-label="서비스 메뉴">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <defs>
                            <linearGradient id="hornGradientOutline" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#c026d3"/>
                                <stop offset="50%" stop-color="#7c3aed"/>
                                <stop offset="100%" stop-color="#1e3a8a"/>
                            </linearGradient>
                        </defs>
                        <g stroke="url(#hornGradientOutline)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                            <path d="M9 17h6M12 6v4"/>
                        </g>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--menu" aria-label="전체 메뉴 열기">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="site-main">
        <h1 class="hero-headline">
            당신을 차갑게<br>
            만들어줄<br>
            투자 플랫폼
        </h1>
        <div class="main-gallery">
            <img src="https://picsum.photos/seed/main01/480/720" width="480" height="720" alt="갤러리 이미지 1">
            <img src="https://picsum.photos/seed/main02/480/720" width="480" height="720" alt="갤러리 이미지 2">
            <img src="https://picsum.photos/seed/main03/480/720" width="480" height="720" alt="갤러리 이미지 3">
        </div>
    </main>
    <footer>
    </footer>
</body>
</html>
