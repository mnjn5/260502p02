<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LS증권 스타일 헤더</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/aos.css">
</head>
<body>
    <div class="scroll-chart-bg" aria-hidden="true">
        <svg class="scroll-chart-svg" viewBox="0 0 100 100" preserveAspectRatio="none" width="100%" height="100%">
            <defs>
                <filter id="chartGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="0.35" result="blur"/>
                    <feMerge>
                        <feMergeNode in="blur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>
            <g class="scroll-chart-grid" opacity="0.12" stroke="#64748b" stroke-width="0.08">
                <line x1="0" y1="20" x2="100" y2="20"/>
                <line x1="0" y1="40" x2="100" y2="40"/>
                <line x1="0" y1="60" x2="100" y2="60"/>
                <line x1="0" y1="80" x2="100" y2="80"/>
                <line x1="20" y1="0" x2="20" y2="100"/>
                <line x1="40" y1="0" x2="40" y2="100"/>
                <line x1="60" y1="0" x2="60" y2="100"/>
                <line x1="80" y1="0" x2="80" y2="100"/>
            </g>
            <path
                id="chartTrendPath"
                class="scroll-chart-path"
                fill="none"
                stroke="#FF0000"
                stroke-width="0.55"
                stroke-linecap="round"
                stroke-linejoin="round"
                filter="url(#chartGlow)"
                d="M 3 97 L 7 92 L 11 94 L 15 88 L 19 91 L 23 84 L 27 87 L 31 79 L 35 83 L 39 75 L 43 79 L 47 71 L 51 75 L 55 66 L 59 71 L 63 62 L 67 67 L 71 58 L 75 63 L 79 54 L 83 59 L 87 50 L 90 55 L 93 47 L 95 42 L 97 35 L 98 28 L 99 20 L 99.5 12 L 99.8 6"
            />
            <circle id="chartHeadDot" class="scroll-chart-head" r="0.9" fill="#FF0000" opacity="0"/>
        </svg>
    </div>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="LS증권 홈">
                <span class="logo-ls">
                    L<span class="logo-s-wrap">S<span class="logo-s-accent" aria-hidden="true"></span></span>
                </span>
                <span class="logo-sub">증권</span>
            </a>

            <nav class="main-nav" aria-label="주요 메뉴">
                <ul>
                    <li><a href="story.html">투혼스토리</a></li>
                    <li><a href="why.html">WHY 투혼</a></li>
                    <li><a href="download.html">처음이신가요?</a></li>
                    <li><a href="events.html">이벤트</a></li>
                    <li><a href="contact.html">문의</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <button type="button" class="icon-btn icon-btn--filled" aria-label="앱 바로가기">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                        <path d="M9 17h6M12 6v4"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--outline" aria-label="서비스 메뉴">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <defs>
                            <linearGradient id="hornGradientOutline" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#c026d3"/>
                                <stop offset="50%" stop-color="#7c3aed"/>
                                <stop offset="100%" stop-color="#1e3a8a"/>
                            </linearGradient>
                        </defs>
                        <g stroke="url(#hornGradientOutline)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                            <path d="M9 17h6M12 6v4"/>
                        </g>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--menu" aria-label="전체 메뉴 열기">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    
    <main class="site-main">
        <div class="hero-pin-scene">
            <div class="hero-pin-sticky">
                <h1 class="hero-headline hero-headline--pin">
                    당신을 차갑게<br>
                    만들어줄<br>
                    투자 플랫폼
                </h1>
            </div>
        </div>
        <div>
            <div class="main-gallery">
                <img src="img/img01.png" width="256" height="524" alt="갤러리 이미지 1">
                <img src="img/img02.png" width="246" height="524" alt="갤러리 이미지 2">
                <img src="img/img03.png" width="259" height="527" alt="갤러리 이미지 3">
            </div>
        </div>
        <div class="stack-section">
            <p class="hero-headline">
                시장이 뜨거울수록,<br>
                <b>투자자의 머리는 <span style="color: #1509b6;">차가워야</span> 하니까!</b>
            </p>
        </div>
        <div class="stack-section stack-section--scroll-reveal" id="revealColdnessSection">
            <p class="coldness-lead" style="margin-top: 100vh;">변동성과 불확실함이 가득한 시장에서<br>잃지 않는 단 하나,</p>
            <h1 class="coldness-title" style="margin-bottom: 20vh;">냉철함</h1>
            
            <p style="color : #fff; margin: 100vh 0; font-size: 2.5rem; font-weight: 700;">이제, 차가운 투자자가 될 차례입니다 !</p>
        </div>
        <div class="invest-cta">
            <div class="invest-cta__item" data-aos="zoom-in" data-aos-duration="700" data-aos-delay="0" data-aos-once="false">
                <p class="invest-cta__line">당신의 투자는 지금부터 시작됩니다.</p>
            </div>
            <div class="invest-cta__item" data-aos="zoom-in" data-aos-duration="700" data-aos-delay="120" data-aos-once="false">
                <p class="invest-cta__line">냉철한 판단으로 시장의 혼란 속에서도</p>
            </div>
            <div class="invest-cta__item" data-aos="zoom-in" data-aos-duration="700" data-aos-delay="240" data-aos-once="false">
                <p class="invest-cta__line">안정적인 수익을 창출하세요.</p>
            </div>
        </div>

        <div>
            <h1 style="font-size: 4rem; font-weight: 700; padding: 20vh 0;">냉철하게 시작하기</h1>
        </div>


    </main>
    <footer>
    </footer>
    <button type="button" class="scroll-top-btn" id="scrollTopBtn" aria-label="페이지 맨 위로 이동" title="맨 위로">
        <svg class="scroll-top-btn__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
    </button>
    <script src="js/vendor/aos.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
