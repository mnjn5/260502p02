<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의 — 이메일 문의</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo" aria-label="LS증권 홈">
                <span class="logo-ls">
                    L<span class="logo-s-wrap">S<span class="logo-s-accent" aria-hidden="true"></span></span>
                </span>
                <span class="logo-sub">증권</span>
            </a>

            <nav class="main-nav" aria-label="주요 메뉴">
                <ul>
                    <li><a href="story.html">투혼스토리</a></li>
                    <li><a href="why.html">WHY 투혼</a></li>
                    <li><a href="download.html">처음이신가요?</a></li>
                    <li><a href="events.html">이벤트</a></li>
                    <li><a href="contact.html" class="is-active">문의</a></li>
                </ul>
            </nav>

            <div class="header-actions">
                <button type="button" class="icon-btn icon-btn--filled" aria-label="앱 바로가기">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                        <path d="M9 17h6M12 6v4"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--outline" aria-label="서비스 메뉴">
                    <svg class="horn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <defs>
                            <linearGradient id="hornGradientOutlineCt" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#c026d3"/>
                                <stop offset="50%" stop-color="#7c3aed"/>
                                <stop offset="100%" stop-color="#1e3a8a"/>
                            </linearGradient>
                        </defs>
                        <g stroke="url(#hornGradientOutlineCt)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 18c-2-4-1-8 2-11 1.5-1.5 3.5-2 5.5-1.5M17 18c2-4 1-8-2-11-1.5-1.5-3.5-2-5.5-1.5"/>
                            <path d="M9 17h6M12 6v4"/>
                        </g>
                    </svg>
                </button>
                <button type="button" class="icon-btn icon-btn--menu" aria-label="전체 메뉴 열기">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="site-main site-main--sub">
        <h1 class="page-title">이메일 문의</h1>
        <p class="page-lead">문의 내용을 작성한 뒤 보내기를 누르면 기본 메일 앱이 열립니다. 수신 주소는 운영 정책에 맞게 아래 상수를 수정하세요.</p>

        <form class="contact-form" id="contactForm" novalidate>
            <label>
                이름
                <input type="text" name="name" id="contactName" autocomplete="name" required maxlength="80">
            </label>
            <label>
                회신 이메일
                <input type="email" name="email" id="contactEmail" autocomplete="email" required maxlength="120">
            </label>
            <label>
                제목
                <input type="text" name="subject" id="contactSubject" required maxlength="200">
            </label>
            <label>
                문의 내용
                <textarea name="body" id="contactBody" required maxlength="4000"></textarea>
            </label>
            <p class="contact-form__hint">제출 시 브라우저·메일 클라이언트 설정에 따라 동작이 달라질 수 있습니다. 긴급 건은 고객센터 전화를 이용해 주세요.</p>
            <button type="submit" class="btn-primary">보내기</button>
        </form>
    </main>
    <footer></footer>
    <button type="button" class="scroll-top-btn" id="scrollTopBtn" aria-label="페이지 맨 위로 이동" title="맨 위로">
        <svg class="scroll-top-btn__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
    </button>
    <script src="js/main.js" defer></script>
    <script>
    (function () {
        var TO_ADDRESS = 'inquiry@example.com';
        var form = document.getElementById('contactForm');
        if (!form) return;
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            var name = document.getElementById('contactName').value.trim();
            var email = document.getElementById('contactEmail').value.trim();
            var subject = document.getElementById('contactSubject').value.trim();
            var body = document.getElementById('contactBody').value.trim();
            if (!name || !email || !subject || !body) {
                window.alert('필수 항목을 모두 입력해 주세요.');
                return;
            }
            var mailSubject = '[투혼 문의] ' + subject;
            var mailBody =
                '이름: ' + name + '\n' +
                '회신 이메일: ' + email + '\n\n' +
                '--- 문의 내용 ---\n' +
                body;
            var href =
                'mailto:' + encodeURIComponent(TO_ADDRESS) +
                '?subject=' + encodeURIComponent(mailSubject) +
                '&body=' + encodeURIComponent(mailBody);
            window.location.href = href;
        });
    })();
    </script>
</body>
</html>
